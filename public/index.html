<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Validator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1a2e;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
      padding: 40px;
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #16213e;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    input[type="email"],
    input[type="url"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      background: #fafafa;
    }

    input[type="email"]:focus,
    input[type="url"]:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      background: #fff;
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.01em;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: #4f46e5;
    }

    button[type="submit"]:active:not(:disabled) {
      transform: scale(0.98);
    }

    button[type="submit"]:disabled {
      background: #a5b4fc;
      cursor: not-allowed;
    }

    /* Loading */
    .loading {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      padding: 14px 16px;
      background: #eef2ff;
      border-radius: 8px;
      color: #4338ca;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .loading.visible {
      display: flex;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid #c7d2fe;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error-box {
      display: none;
      margin-top: 24px;
      padding: 14px 16px;
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      border-radius: 8px;
      color: #b91c1c;
      font-size: 0.9rem;
    }

    .error-box.visible {
      display: block;
    }

    .error-box strong {
      display: block;
      margin-bottom: 4px;
    }

    /* Result */
    .result-box {
      display: none;
      margin-top: 24px;
    }

    .result-box.visible {
      display: block;
    }

    .result-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 10px;
    }

    pre {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 10px;
      padding: 20px;
      font-size: 0.85rem;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 420px;
      overflow-y: auto;
    }

    /* Scrollbar styling */
    pre::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    pre::-webkit-scrollbar-track {
      background: transparent;
    }
    pre::-webkit-scrollbar-thumb {
      background: #45475a;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task Validator</h1>
    <p class="subtitle">Enter your email and a URL to validate your application task.</p>

    <form id="validatorForm" novalidate>
      <div class="form-group">
        <label for="emailInput">Email Address</label>
        <input
          type="email"
          id="emailInput"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>
      <div class="form-group">
        <label for="urlInput">URL</label>
        <input
          type="url"
          id="urlInput"
          placeholder="https://your-app-url.com"
          required
          autocomplete="off"
        />
      </div>
      <button type="submit" id="submitBtn">Validate</button>
    </form>

    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <span>Validating, please wait…</span>
    </div>

    <div class="error-box" id="errorBox">
      <strong>Something went wrong</strong>
      <span id="errorMessage"></span>
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-label">Response</div>
      <pre id="resultOutput"></pre>
    </div>
  </div>

  <script>
    const form = document.getElementById('validatorForm');
    const emailInput = document.getElementById('emailInput');
    const urlInput = document.getElementById('urlInput');
    const submitBtn = document.getElementById('submitBtn');
    const loadingState = document.getElementById('loadingState');
    const errorBox = document.getElementById('errorBox');
    const errorMessage = document.getElementById('errorMessage');
    const resultBox = document.getElementById('resultBox');
    const resultOutput = document.getElementById('resultOutput');

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? 'Validating…' : 'Validate';
      loadingState.classList.toggle('visible', isLoading);
    }

    function showError(msg) {
      errorMessage.textContent = msg;
      errorBox.classList.add('visible');
      resultBox.classList.remove('visible');
    }

    function hideError() {
      errorBox.classList.remove('visible');
    }

    function showResult(data) {
      resultOutput.textContent = JSON.stringify(data, null, 2);
      resultBox.classList.add('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      resultBox.classList.remove('visible');

      const email = emailInput.value.trim();
      const url = urlInput.value.trim();

      if (!email || !url) {
        showError('Both email and URL fields are required.');
        return;
      }

      const validationURL =
        `https://yhxzjyykdsfkdrmdxgho.supabase.co/functions/v1/application-task` +
        `?url=${encodeURIComponent(url)}&email=${encodeURIComponent(email)}`;

      setLoading(true);

      try {
        const response = await fetch(validationURL);
        const contentType = response.headers.get('content-type') || '';
        let data;

        if (contentType.includes('application/json')) {
          data = await response.json();
        } else {
          const text = await response.text();
          data = { raw: text };
        }

        if (!response.ok) {
          showError(`Server responded with status ${response.status}: ${data?.message || data?.error || JSON.stringify(data)}`);
        } else {
          showResult(data);
        }
      } catch (err) {
        showError(`Network error: ${err.message}. Check your connection or the URL and try again.`);
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
